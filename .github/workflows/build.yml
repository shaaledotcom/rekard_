name: Build

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, viewers, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "${{ matrix.project }}/pnpm-lock.yaml"

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.project }}

      - name: Build
        env:
          # Placeholders so Next.js prerender succeeds (frontend only needs these at build time)
          NEXT_PUBLIC_SUPABASE_URL: ${{ matrix.project == 'frontend' && 'https://placeholder.supabase.co' || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ matrix.project == 'frontend' && 'placeholder-anon-key' || '' }}
        run: pnpm run build
        working-directory: ${{ matrix.project }}
